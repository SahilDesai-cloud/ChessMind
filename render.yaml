services:
  - type: web
    name: chessmind-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: STOCKFISH_DEPTH
        value: "15"
      - key: INACCURACY_THRESHOLD
        value: "-1.0"
      - key: MISTAKE_THRESHOLD
        value: "-1.5"
      - key: EXPLAIN_EVAL_THRESHOLD
        value: "-1.5"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: DATABASE_URL
        fromDatabase:
          name: chessmind-db
          property: connectionString

databases:
  - name: chessmind-db
    plan: free
